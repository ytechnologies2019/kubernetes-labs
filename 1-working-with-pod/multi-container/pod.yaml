apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  containers:
    - name: nginx
      image: nginx
    - name: curl-logger
      image: thihathura/test-container
      command:
        - /bin/sh
        - -c
        - |
          while true; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo 000)
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) $status" >> /tmp/access.log
            sleep 5
          done > /tmp/curl-logger.log
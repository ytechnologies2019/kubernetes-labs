apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: netflix

  template:
    metadata:
      labels:
        app: netflix

    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: netflix
          image: ytechnologies/netflix:latest

          ports:
            - containerPort: 80
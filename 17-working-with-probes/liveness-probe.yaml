  apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: web
    name: web
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: web
    template:
      metadata:
        labels:
          app: web
      spec:
        containers:
        - image: gcr.io/google-samples/hello-app:1.0
          name: hello-app

          # Check application after startup completed
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3   # Wait 3 sec AFTER startupProbe succeeds
            periodSeconds: 3         # Run every 3 sec